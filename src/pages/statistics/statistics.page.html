<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="gradient-header">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-btn">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Estatísticas</ion-title>
    <ion-buttons slot="end">
      <ion-button class="share-btn">
        <ion-icon slot="icon-only" name="share-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- Period Selector -->
  <div class="period-selector">
    <ion-button 
      [class.active]="selectedPeriod === 'Dia'"
      (click)="setPeriod('Dia')"
      class="period-btn">
      Dia
    </ion-button>
    <ion-button 
      [class.active]="selectedPeriod === 'Semana'"
      (click)="setPeriod('Semana')"
      class="period-btn">
      Semana
    </ion-button>
    <ion-button 
      [class.active]="selectedPeriod === 'Mês'"
      (click)="setPeriod('Mês')"
      class="period-btn">
      Mês
    </ion-button>
    <ion-button 
      [class.active]="selectedPeriod === 'Ano'"
      (click)="setPeriod('Ano')"
      class="period-btn">
      Ano
    </ion-button>
  </div>

  <!-- Chart Card -->
  <ion-card class="chart-card">
    <ion-card-content>
      <div class="chart-header">
        <h3>Gastos</h3>
        <ion-note>Filtrar</ion-note>
      </div>
      
      <!-- SVG Chart (Gráfico de Linha) -->
      <svg class="chart" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
        <!-- Grid Lines -->
        <line x1="0" y1="50" x2="400" y2="50" stroke="#e0e0e0" stroke-width="1" />
        <line x1="0" y1="100" x2="400" y2="100" stroke="#e0e0e0" stroke-width="1" />
        <line x1="0" y1="150" x2="400" y2="150" stroke="#e0e0e0" stroke-width="1" />

        <!-- Curve Path -->
        <path
          d="M 10 120 Q 70 80, 130 110 T 250 60 T 390 100"
          stroke="#4E5EB3"
          stroke-width="3"
          fill="none"
          stroke-linecap="round"
        />

        <!-- Fill Area -->
        <path
          d="M 10 120 Q 70 80, 130 110 T 250 60 T 390 100 L 390 200 L 10 200 Z"
          fill="url(#gradient)"
          opacity="0.1"
        />

        <!-- Gradient Definition -->
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4E5EB3;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#4E5EB3;stop-opacity:0" />
          </linearGradient>
        </defs>

        <!-- Data Points -->
        <circle cx="70" cy="80" r="4" fill="#4E5EB3" />
        <circle cx="130" cy="110" r="4" fill="#4E5EB3" />
        <circle cx="190" cy="75" r="4" fill="#4E5EB3" />
        <circle cx="250" cy="60" r="4" fill="#4E5EB3" />
        <circle cx="310" cy="85" r="4" fill="#4E5EB3" />
        <circle cx="370" cy="100" r="4" fill="#4E5EB3" />

        <!-- X Axis Labels -->
        <text x="20" y="190" font-size="12" fill="#999" text-anchor="middle">Mar</text>
        <text x="80" y="190" font-size="12" fill="#999" text-anchor="middle">Abr</text>
        <text x="140" y="190" font-size="12" fill="#999" text-anchor="middle">Mai</text>
        <text x="200" y="190" font-size="12" fill="#999" text-anchor="middle">Jun</text>
        <text x="260" y="190" font-size="12" fill="#999" text-anchor="middle">Jul</text>
        <text x="320" y="190" font-size="12" fill="#999" text-anchor="middle">Ago</text>
        <text x="380" y="190" font-size="12" fill="#999" text-anchor="middle">Set</text>

        <!-- Tooltip -->
        <g class="tooltip">
          <circle cx="130" cy="110" r="8" fill="none" stroke="#4E5EB3" stroke-width="2" />
          <line x1="130" y1="0" x2="130" y2="110" stroke="#4E5EB3" stroke-width="1" stroke-dasharray="3,3" />
          <rect x="100" y="20" width="60" height="25" fill="white" stroke="#4E5EB3" stroke-width="1" rx="4" />
          <text x="130" y="38" font-size="14" font-weight="bold" fill="#4E5EB3" text-anchor="middle">R$1,230</text>
        </g>
      </svg>
    </ion-card-content>
  </ion-card>

  <!-- Main Expenses Section -->
  <div class="section-header">
    <h3>Principais Gastos</h3>
    <ion-note>Filtrar</ion-note>
  </div>

  <ion-list lines="none">
    <ion-item *ngFor="let expense of expenses" class="expense-item">
      <div slot="start" class="expense-icon-container">
        <div class="expense-icon">{{ expense.icon }}</div>
      </div>
      <ion-label>
        <h2>{{ expense.name }}</h2>
        <p>{{ expense.date }}</p>
      </ion-label>
      <ion-text slot="end" class="expense-amount">
        - R$ {{ expense.amount | number: '1.2-2' }}
      </ion-text>
    </ion-item>
  </ion-list>
</ion-content>

<!-- Bottom Tab Bar -->
<ion-footer class="ion-no-border">
  <ion-toolbar class="tab-bar">
    <div class="tab-buttons">
      <ion-button 
        (click)="setActiveTab('home')" 
        [class.active]="activeTab === 'home'"
        class="tab-btn">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
      
      <ion-button 
        (click)="setActiveTab('stats')" 
        [class.active]="activeTab === 'stats'"
        class="tab-btn">
        <ion-icon name="stats-chart-outline"></ion-icon>
      </ion-button>

      <!-- FAB Button Centralizado -->
      <ion-button class="fab-button" (click)="onFabClick()">
        <ion-icon name="add"></ion-icon>
      </ion-button>

      <ion-button 
        (click)="setActiveTab('wallet')" 
        [class.active]="activeTab === 'wallet'"
        class="tab-btn">
        <ion-icon name="wallet-outline"></ion-icon>
      </ion-button>
      
      <ion-button 
        (click)="setActiveTab('profile')" 
        [class.active]="activeTab === 'profile'"
        class="tab-btn">
        <ion-icon name="person-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
