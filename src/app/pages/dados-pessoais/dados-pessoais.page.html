<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="gradient-header">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-btn">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Dados Pessoais</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="content-card">

    <div class="field-group">
      <span class="field-label">Nome completo</span>
      <span class="field-value">{{ nome || '—' }}</span>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <span class="field-label">E-mail</span>
      <span class="field-value">{{ email || '—' }}</span>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <span class="field-label">Membro desde</span>
      <span class="field-value">{{ criadoEm || '—' }}</span>
    </div>

  </div>
</ion-content>
