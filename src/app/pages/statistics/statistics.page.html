<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar class="gradient-header">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-btn">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Estatísticas</ion-title>
    <ion-buttons slot="end">
      <ion-button class="share-btn" (click)="exportarPlanilha()" title="Exportar planilha">
        <ion-icon slot="icon-only" name="download-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <!-- Period Selector -->
  <div class="period-selector">
    <ion-button [class.active]="selectedPeriod === 'Dia'" (click)="setPeriod('Dia')" class="period-btn">Dia</ion-button>
    <ion-button [class.active]="selectedPeriod === 'Semana'" (click)="setPeriod('Semana')" class="period-btn">Semana</ion-button>
    <ion-button [class.active]="selectedPeriod === 'Mês'" (click)="setPeriod('Mês')" class="period-btn">Mês</ion-button>
    <ion-button [class.active]="selectedPeriod === 'Ano'" (click)="setPeriod('Ano')" class="period-btn">Ano</ion-button>
  </div>

  <!-- Chart Card -->
  <ion-card class="chart-card">
    <ion-card-content>
      <div class="chart-header">
        <h3>Gastos</h3>
        <div class="chart-legend">
          <span class="legend-item">
            <span class="legend-dot expense-dot"></span> Gastos
          </span>
          <span class="legend-item">
            <span class="legend-dot usd-dot"></span> USD/BRL
          </span>
        </div>
      </div>

      <div class="chart-wrapper">
        <ion-spinner *ngIf="loadingUsd" name="crescent" class="chart-spinner"></ion-spinner>

        <svg class="chart" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="expenseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#4E5EB3;stop-opacity:0.25" />
              <stop offset="100%" style="stop-color:#4E5EB3;stop-opacity:0" />
            </linearGradient>
            <linearGradient id="usdGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:0.2" />
              <stop offset="100%" style="stop-color:#FF9F43;stop-opacity:0" />
            </linearGradient>
          </defs>

          <!-- Grid Lines -->
          <line x1="30" y1="40" x2="390" y2="40" stroke="#f0f0f0" stroke-width="1" />
          <line x1="30" y1="82" x2="390" y2="82" stroke="#f0f0f0" stroke-width="1" />
          <line x1="30" y1="124" x2="390" y2="124" stroke="#f0f0f0" stroke-width="1" />

          <!-- USD area fill -->
          <path *ngIf="usdPoints.length > 1"
            [attr.d]="generateAreaPath(usdPoints)"
            fill="url(#usdGradient)" />

          <!-- USD line -->
          <path *ngIf="usdPoints.length > 1"
            [attr.d]="generatePath(usdPoints)"
            stroke="#FF9F43" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

          <!-- Expense area fill -->
          <path *ngIf="expensePoints.length > 1"
            [attr.d]="generateAreaPath(expensePoints)"
            fill="url(#expenseGradient)" />

          <!-- Expense line -->
          <path *ngIf="expensePoints.length > 1"
            [attr.d]="generatePath(expensePoints)"
            stroke="#4E5EB3" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

          <!-- USD dots -->
          <circle *ngFor="let p of usdPoints"
            [attr.cx]="p.x" [attr.cy]="p.y" r="3" fill="#FF9F43" />

          <!-- Expense dots -->
          <circle *ngFor="let p of expensePoints"
            [attr.cx]="p.x" [attr.cy]="p.y" r="3.5" fill="#4E5EB3" />

          <!-- X axis labels -->
          <text *ngFor="let p of expensePoints"
            [attr.x]="p.x" y="196"
            font-size="10" fill="#aaa" text-anchor="middle">{{ p.label }}</text>
        </svg>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Main Expenses Section -->
  <div class="section-header">
    <h3>Principais Gastos</h3>
    <ion-note>Filtrar</ion-note>
  </div>

  <ion-list lines="none">
    <ion-item *ngFor="let expense of expenses" class="expense-item">
      <div slot="start" class="expense-icon-container">
        <img *ngIf="isImageIcon(expense.icon)" [src]="getIcon(expense.icon)" class="expense-icon-img">
        <div *ngIf="!isImageIcon(expense.icon)" class="expense-icon">{{ expense.icon }}</div>
      </div>
      <ion-label>
        <h2>{{ expense.name }}</h2>
        <p>{{ expense.date }}</p>
      </ion-label>
      <ion-text slot="end" class="expense-amount">
        - R$ {{ expense.amount | number: '1.2-2' }}
      </ion-text>
    </ion-item>
  </ion-list>
</ion-content>

<!-- Bottom Tab Bar -->
<ion-footer class="ion-no-border">
  <ion-toolbar class="tab-bar">
    <div class="tab-buttons">
      <ion-button (click)="setActiveTab('home')" [class.active]="activeTab === 'home'" class="tab-btn">
        <ion-icon name="home-outline"></ion-icon>
      </ion-button>
      <ion-button (click)="setActiveTab('stats')" [class.active]="activeTab === 'stats'" class="tab-btn">
        <ion-icon name="stats-chart-outline"></ion-icon>
      </ion-button>
      <ion-button class="fab-button" (click)="onFabClick()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
      <ion-button (click)="setActiveTab('wallet')" [class.active]="activeTab === 'wallet'" class="tab-btn">
        <ion-icon name="wallet-outline"></ion-icon>
      </ion-button>
      <ion-button (click)="setActiveTab('profile')" [class.active]="activeTab === 'profile'" class="tab-btn">
        <ion-icon name="person-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
