<ion-header class="ion-no-border">
  <ion-toolbar class="gradient-header">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-btn">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Fluxo</ion-title>
    <div class="header-decor">
      <div class="circle circle-lg"></div>
      <div class="circle circle-sm"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="auth-content">
  <div class="form-card">
    <h1 class="form-title">Bem-vindo de volta!</h1>
    <p class="form-subtitle">Faça login para acessar sua conta</p>

    <div class="input-group">
      <label>Email</label>
      <div class="input-wrapper">
        <input type="email" [(ngModel)]="email" placeholder="seu@email.com" />
      </div>
    </div>

    <div class="input-group">
      <label>Senha</label>
      <div class="input-wrapper">
        <input type="password" [(ngModel)]="senha" placeholder="••••••••••••" />
      </div>
    </div>

    <p class="forgot-link" (click)="irParaEsqueciSenha()">Esqueceu sua senha?</p>

    <ion-button expand="full" class="btn-primary" (click)="entrar()">
      Entrar
    </ion-button>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">Ou</span>
      <span class="divider-line"></span>
    </div>

    <p class="bottom-link">
      Não tem conta? <span (click)="irParaCadastro()">Criar conta</span>
    </p>
  </div>
</ion-content>
